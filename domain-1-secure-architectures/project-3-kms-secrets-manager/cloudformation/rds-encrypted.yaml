AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SAA Study Project 1.3 - MySQL RDS instance encrypted at rest with KMS CMK,
  credentials stored and rotated via Secrets Manager.
  Requires vpc-secure.yaml and kms-key.yaml to be deployed first.

Parameters:
  DBName:
    Type: String
    Default: saadb
  DBUsername:
    Type: String
    Default: admin
  DBInstanceClass:
    Type: String
    Default: db.t3.micro

Resources:

  # ── DB Subnet Group ───────────────────────────────────────────────────────
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for SAA RDS instance
      SubnetIds:
        - !ImportValue SAA-PrivateSubnet1-Id
        - !ImportValue SAA-PrivateSubnet2-Id
      Tags:
        - Key: Project
          Value: SAA-Study

  # ── Security Group ────────────────────────────────────────────────────────
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS MySQL - allow port 3306 from within VPC
      VpcId: !ImportValue SAA-VPC-Id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: SAA-RDS-SG
        - Key: Project
          Value: SAA-Study

  # ── Secrets Manager Secret (initial password) ─────────────────────────────
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /prod/rds/mysql-credentials
      Description: RDS MySQL credentials - auto-rotated every 30 days
      KmsKeyId: !ImportValue SAA-KMS-Key-Arn
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${DBUsername}"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Project
          Value: SAA-Study

  # ── RDS MySQL Instance (encrypted at rest) ────────────────────────────────
  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete    # For lab use only — use Snapshot in production
    Properties:
      DBInstanceIdentifier: saa-encrypted-mysql
      DBInstanceClass: !Ref DBInstanceClass
      Engine: mysql
      EngineVersion: '8.0'
      DBName: !Ref DBName
      MasterUsername: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      AllocatedStorage: '20'
      StorageType: gp3
      StorageEncrypted: true           # Enable encryption at rest
      KmsKeyId: !ImportValue SAA-KMS-Key-Arn  # Use our CMK (not AWS managed)
      BackupRetentionPeriod: 7
      DeletionProtection: false        # Set true in production
      PubliclyAccessible: false
      MultiAZ: false                   # Keep costs low for lab; set true for HA
      Tags:
        - Key: Project
          Value: SAA-Study

  # Attach the secret to the RDS instance so Secrets Manager knows the target
  DBSecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref DBSecret
      TargetId: !Ref DBInstance
      TargetType: AWS::RDS::DBInstance

  # ── Secrets Manager Rotation ──────────────────────────────────────────────
  # NOTE: Uncomment this block after the stack is deployed.
  # The rotation Lambda needs the DB to be running first.
  #
  # DBSecretRotationSchedule:
  #   Type: AWS::SecretsManager::RotationSchedule
  #   DependsOn: DBSecretAttachment
  #   Properties:
  #     SecretId: !Ref DBSecret
  #     HostedRotationLambda:
  #       RotationType: MySQLSingleUser
  #       RotationLambdaName: saa-rds-rotation
  #     RotationRules:
  #       AutomaticallyAfterDays: 30

  # ── IAM Policy for retrieving the secret ─────────────────────────────────
  SecretsReaderPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: SAA-SecretsManagerReader
      Description: Allows reading the RDS credentials secret
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource: !Ref DBSecret
          - Effect: Allow
            Action:
              - kms:Decrypt
            Resource: !ImportValue SAA-KMS-Key-Arn

Outputs:
  DBEndpoint:
    Value: !GetAtt DBInstance.Endpoint.Address
    Description: RDS endpoint address

  DBSecretArn:
    Value: !Ref DBSecret
    Description: Secrets Manager secret ARN for the DB credentials

  DBInstanceId:
    Value: !Ref DBInstance
    Description: RDS DB instance identifier
